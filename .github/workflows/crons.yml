name: Strategy Engine Crons

on:
  schedule:
    # IMPORTANT: Each cron must have UNIQUE trigger minutes to avoid GitHub Actions
    # schedule collision. When multiple crons fire at the same minute, GitHub picks
    # one and skips the rest. Every schedule below uses distinct minute offsets.
    #
    # Price snapshots — every 5 minutes (:00,:05,:10,...)
    - cron: '*/5 * * * *'
    # Strategy scan + auto-trade — every 5 minutes (:01,:06,:11,...)
    - cron: '1,6,11,16,21,26,31,36,41,46,51,56 * * * *'
    # Alert check — every 5 minutes (:02,:07,:12,...)
    - cron: '2,7,12,17,22,27,32,37,42,47,52,57 * * * *'
    # External data fetch — every 15 minutes (:03,:18,:33,:48)
    - cron: '3,18,33,48 * * * *'
    # Trade resolution — every 30 minutes (:04,:34)
    - cron: '4,34 * * * *'
    # Portfolio snapshot — every hour (:08)
    - cron: '8 * * * *'
    # Market sync — every 6 hours (:09)
    - cron: '9 */6 * * *'
    # Strategy tuning — weekly Sunday midnight (:13)
    - cron: '13 0 * * 0'
    # Historical trade fetch — daily at 2:14am
    - cron: '14 2 * * *'
    # Refresh market mappings — every 6 hours (:38)
    - cron: '38 */6 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which job to run'
        required: true
        type: choice
        options:
          - sync
          - snapshot
          - scan
          - resolve
          - portfolio
          - tune
          - orderbook
          - fetch-history
          - external-data
          - alert-check
          - refresh-mappings
          - all

jobs:
  sync:
    if: github.event.schedule == '9 */6 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'sync' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Sync markets (chunked — resumes via cursor)
        run: |
          CURSOR=""
          CHUNK=1
          MAX_CHUNKS=12
          while [ $CHUNK -le $MAX_CHUNKS ]; do
            echo "=== Chunk $CHUNK ==="
            URL="${{ secrets.APP_URL }}/api/markets/sync"
            if [ -n "$CURSOR" ]; then
              URL="${URL}?cursor=${CURSOR}"
            fi
            HTTP_CODE=$(curl -sS --max-time 55 -o /tmp/response.txt -w "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "$URL")
            cat /tmp/response.txt
            if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
              echo "::error::HTTP $HTTP_CODE from /api/markets/sync (chunk $CHUNK)"
              exit 1
            fi
            # Check if there's a next cursor
            CURSOR=$(cat /tmp/response.txt | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('next_cursor','') or '')" 2>/dev/null || echo "")
            if [ -z "$CURSOR" ]; then
              echo "Sync complete after $CHUNK chunks"
              break
            fi
            echo "Continuing with cursor: $CURSOR"
            CHUNK=$((CHUNK + 1))
            sleep 2
          done

  snapshot:
    if: github.event.schedule == '*/5 * * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'snapshot' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Price snapshots
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/prices/snapshot")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/prices/snapshot"
            exit 1
          fi

  scan:
    if: github.event.schedule == '1,6,11,16,21,26,31,36,41,46,51,56 * * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'scan' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Strategy scan + auto-trade
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/strategies/scan")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/strategies/scan"
            exit 1
          fi

  resolve:
    if: github.event.schedule == '4,34 * * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'resolve' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Resolve trades
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/trades/resolve")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/trades/resolve"
            exit 1
          fi

  portfolio:
    if: github.event.schedule == '8 * * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'portfolio' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Portfolio snapshot
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/portfolio/snapshot")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/portfolio/snapshot"
            exit 1
          fi

  tune:
    if: github.event.schedule == '13 0 * * 0' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'tune' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Tune strategies
        run: |
          HTTP_CODE=$(curl -sS -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/strategies/tune")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/strategies/tune"
            exit 1
          fi

  orderbook:
    if: github.event.schedule == '*/5 * * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'orderbook' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Orderbook snapshots
        run: |
          HTTP_CODE=$(curl -sS --max-time 55 -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/orderbook/snapshot")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/orderbook/snapshot"
            exit 1
          fi

  alert-check:
    if: github.event.schedule == '2,7,12,17,22,27,32,37,42,47,52,57 * * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'alert-check' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Check for stale price opportunities + send email alerts
        run: |
          HTTP_CODE=$(curl -sS --max-time 65 -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/alerts/check")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/alerts/check"
            exit 1
          fi

  external-data:
    if: github.event.schedule == '3,18,33,48 * * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'external-data' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Fetch external data signals
        run: |
          HTTP_CODE=$(curl -sS --max-time 130 -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/external-data/fetch")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/external-data/fetch"
            exit 1
          fi

  fetch-history:
    if: github.event.schedule == '14 2 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'fetch-history' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Fetch historical trade data
        run: |
          HTTP_CODE=$(curl -sS --max-time 280 -o /tmp/response.txt -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/trades/fetch-history")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/trades/fetch-history"
            exit 1
          fi

  refresh-mappings:
    if: github.event.schedule == '38 */6 * * *' || (github.event_name == 'workflow_dispatch' && (inputs.job == 'refresh-mappings' || inputs.job == 'all'))
    runs-on: ubuntu-latest
    steps:
      - name: Refresh Polymarket↔Kalshi market mappings
        run: |
          HTTP_CODE=$(curl -sS --max-time 55 -o /tmp/response.txt -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/mappings/refresh")
          cat /tmp/response.txt
          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::HTTP $HTTP_CODE from /api/mappings/refresh"
            exit 1
          fi
